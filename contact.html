<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1.5rem;
        }

        label {
            display: block;
            margin: 1.2rem 0 0.4rem;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 1.5rem;
            padding: 0.9rem 1.8rem;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0055aa;
        }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="/submit-contact" method="post">
        <!--Name input-->
        <label for="full-name">Name:</label>
        <input type="text" id="full-name" name="name" placeholder="Full name" size="30" required>
    
        <!--Email input-->
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="Valid email address" size="30" required>
    
        <!--Contact Details input-->
        <label for="contact-details">Contact Details:</label>
        <input type="tel" id="contact-details" name="contact" placeholder="Personal/Home/Office TelNo." size="30" required>
        
        <fieldset>
            <!--Role input-->
            <legend>Are you an employer or a job seeker?</legend>
            <label><input type="radio" name="role" value="employer" required> Employer</label>
            <label><input type="radio" name="role" value="job-seeker"> job Seeker</label>
        </fieldset>

        <!--Message input-->
        <label for="message">Your message:</label>
        <textarea id="message" name="message" rows="8" cols="60" placeholder="Feel free to ask us anything..." minlength="10" required ></textarea>

        <!--Privacy Policy Checkbox-->
        <label>
            <input type="checkbox" name="privacy-consent" required>
            By checking in this option, I acknowledge and agree to the <a href="/privacy-policy" target="_blank">Privacy Policy</a>

        <!--Submit button-->
        <button type="submit">Send Form</button>
    </form>
</body>
</html>
